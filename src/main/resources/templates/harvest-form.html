<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Record Daily Harvest</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Record Daily Harvest</h1>

<p th:if="${message}" th:text="${message}" style="color: green;"></p>
<p th:if="${error}" th:text="${error}" style="color: red;"></p>

<form th:action="@{/harvest/create}" th:object="${harvest}" method="post" enctype="multipart/form-data">
    <div>
        <label for="laborerName">Laborer Name:</label>
        <input type="text" id="laborerName" th:field="*{laborerName}">
    </div>
    <br>

    <div>
        <label for="harvestDate">Harvest Date:</label>
        <input type="date" id="harvestDate" th:field="*{harvestDate}">
    </div>
    <br>

    <div>
        <label for="weightKg">Weight (kg):</label>
        <input type="number" step="0.01" id="weightKg" th:field="*{weightKg}">
    </div>
    <br>

    <div>
        <label for="notes">Notes:</label>
        <textarea id="notes" th:field="*{notes}"></textarea>
    </div>
    <br>

    <div>
        <label for="photo">Photo Evidence:</label>
        <input type="file" id="photo" name="photo" accept="image/*">
    </div>
    <br>

    <button type="submit">Submit Harvest</button>
</form>

</body>
</html>
