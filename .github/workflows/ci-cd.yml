name: Java CI/CD with SonarCloud and Heroku

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:

  build-and-analyze:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and Run Tests
        run: ./gradlew clean build --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: SonarCloud Analysis
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew sonar --no-daemon \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Upload Test Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/


  deploy-staging:
    name: Deploy to Staging (Heroku)
    runs-on: ubuntu-latest
    needs: build-and-analyze
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku API Key
        run: echo "HEROKU_API_KEY=${{ secrets.HEROKU_API_KEY }}" >> $GITHUB_ENV

      - name: Ensure full git history
        run: git fetch --prune --unshallow || true

      - name: Deploy to Heroku Staging
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "github-actions"

          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/mysawit-staging.git

          git push heroku HEAD:main --force


  deploy-production:
    name: Deploy to Production (Heroku)
    runs-on: ubuntu-latest
    needs: build-and-analyze
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Set Heroku API Key
        run: echo "HEROKU_API_KEY=${{ secrets.HEROKU_API_KEY }}" >> $GITHUB_ENV

      - name: Ensure full git history
        run: git fetch --prune --unshallow || true

      - name: Deploy to Heroku Production
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "github-actions"

          git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/mysawit-prod.git

          git push heroku HEAD:main --force